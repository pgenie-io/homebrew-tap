name: CI (macOS arm64)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Tap local formula
        run: brew tap pgenie-io/tap "$GITHUB_WORKSPACE"

      - name: Install formula
        run: brew install pgenie-io/tap/pgn

      - name: Check version
        run: pgn --version
