name: CI (Linux x64)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # The pre-built Linux binary is dynamically linked against the system
      # libpq.  Install the runtime library so the binary can find it.
      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap local formula
        run: brew tap pgenie-io/tap "$GITHUB_WORKSPACE"

      - name: Install formula
        run: brew install pgenie-io/tap/pgn

      - name: Check version
        run: pgn --version

      - name: Checkout demo project
        uses: actions/checkout@v6
        with:
          repository: pgenie-io/demo
          ref: 3fd8694f8f77c46e99c5b2d16a88f63b0d6aa21b
          path: demo

      - name: Run end-to-end test
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/demo"
          pgn generate
